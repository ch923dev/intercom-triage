# gitleaks config — secret scanning for pre-commit.
# Used by .githooks/pre-commit when the `gitleaks` binary is installed.
# Install (optional, strengthens the hook): https://github.com/gitleaks/gitleaks
#   winget install gitleaks   |   scoop install gitleaks   |   brew install gitleaks
# The hook works WITHOUT gitleaks too (built-in regex fallback) — this file only
# tunes gitleaks when present.

# Inherit gitleaks' built-in ruleset (AWS, GitHub, Stripe, private keys, JWTs, …).
[extend]
useDefault = true

# Project-specific extra rule: OpenRouter keys (sk-or-v1-...).
[[rules]]
id = "openrouter-api-key"
description = "OpenRouter API key"
regex = '''sk-or-v1-[0-9a-f]{32,}'''
keywords = ["sk-or-v1-"]

# Intercom workspace Access Token committed into a config/env assignment. The
# token itself has no fixed prefix, so key off the variable name with a
# real-looking value (dummies are allowlisted below).
[[rules]]
id = "intercom-access-token"
description = "Intercom Access Token"
regex = '''(?i)intercom_access_token\s*[:=]\s*['"]?[A-Za-z0-9+/=_-]{20,}'''
keywords = ["intercom_access_token"]

[allowlist]
description = "Known-safe matches — placeholders, examples, test fixtures, audit notes"
paths = [
  '''\.env\.example$''',
  '''(^|/)backend/tests/''',
  '''(^|/)webapp/.*\.spec\.ts$''',
  '''(^|/)extension/.*\.test\.js$''',
  '''(^|/)extension/fixtures/''',
  '''(^|/)docs/_archive/''',
]
# j3dxf22l / testworkspace = public Intercom workspace app_id (not a secret).
# "test-openrouter-key" / "test-intercom-token" = dummy values in test config.
regexes = [
  '''j3dxf22l''',
  '''testworkspace''',
  '''test-openrouter-key''',
  '''test-intercom-token''',
]
