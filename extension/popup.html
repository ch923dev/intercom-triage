<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Intercom Triage</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="bar">
      <span class="brand-dot"></span>
      <span class="wordmark">Triage</span>
      <span id="count" class="mono muted"></span>
      <button id="refresh" class="ghost" type="button">Refresh</button>
    </header>

    <nav id="tabs" class="tabs" aria-label="Categories"></nav>

    <div id="banner" class="banner" hidden></div>

    <main id="list" class="list">
      <p class="state mono">Loading…</p>
    </main>

    <footer class="bar foot">
      <label class="mono muted" for="interval">Background poll</label>
      <select id="interval" class="select">
        <option value="0">Off</option>
        <option value="5">Every 5 min</option>
        <option value="15">Every 15 min</option>
        <option value="30">Every 30 min</option>
      </select>
      <button id="openBoard" class="ghost" type="button">Open full board ↗</button>
    </footer>

    <script type="module" src="popup.js"></script>
  </body>
</html>
