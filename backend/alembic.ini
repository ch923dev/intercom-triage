# Alembic configuration for the Intercom Triage backend.
# The database URL is NOT stored here — env.py reads it from AppConfig
# so we stay compatible with SQLite (dev) and Postgres (prod) without
# changing any config file.

[alembic]
# Path to the migrations directory, relative to this file.
script_location = alembic

# No sqlalchemy.url here — env.py pulls it from AppConfig.

# Revision file name format.
file_template = %%(rev)s_%%(slug)s

# Timezone for generated "Create Date" comments.
timezone = UTC

# sys.path additions when env.py is loaded (comma-separated).
# Empty here; the backend/ directory is added to sys.path by env.py itself.
prepend_sys_path = .
path_separator = os

# Logging config for the `alembic` CLI.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
